name: Publish ProductFlow GHCR image

on:
  push:
    branches:
      - productflow-sso
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: false
        default: "v1.0.0-rc.7-productflow-sso"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve image metadata
        run: |
          TAG="${{ github.event.inputs.tag || 'v1.0.0-rc.7-productflow-sso' }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "${TAG}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:productflow-sso-${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ProductFlow image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE}:${TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE}:productflow-sso-${SHORT_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
